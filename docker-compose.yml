services:
  web:
    build: .
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    restart: always
    volumes:
      - next_cache:/app/.next/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/uz"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: always

volumes:
  caddy_data:
  caddy_config:
  next_cache:
